name: Auto Apply Worker

on:
  schedule:
    - cron: "*/30 * * * *"   # كل 30 دقيقة
  workflow_dispatch:           # تشغيل يدوي من GitHub

jobs:
  run-worker:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install httpx python-dotenv

      - name: Run auto-apply worker
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          RESEND_FROM_EMAIL: ${{ secrets.RESEND_FROM_EMAIL }}
          RESEND_FROM_NAME: ${{ secrets.RESEND_FROM_NAME }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          JOBS_SOURCE_CHANNEL_ID: ${{ secrets.JOBS_SOURCE_CHANNEL_ID }}
          BOT_TOKEN: ${{ secrets.BOT_TOKEN }}
        run: python3 worker/main.py
